name: Code Quality & Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          echo "🔍 Verificando sintaxe JavaScript..."
          node -c cypress.config.js
          find cypress -name "*.js" -type f -exec node -c {} \; || true

      - name: Validate JSON files
        run: |
          echo "🔍 Validando arquivos JSON..."
          find cypress/fixtures -name "*.json" -type f -exec node -e "const fs = require('fs'); const file = process.argv[1]; try { JSON.parse(fs.readFileSync(file, 'utf8')); console.log('✅ ' + file); } catch(e) { console.error('❌ ' + file + ': ' + e.message); process.exit(1); }" {} \;

      - name: Check npm vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Validate test structure
        run: |
          echo "🔍 Validando estrutura dos testes..."
          if [ -d "cypress/e2e/dog-api/" ]; then
            echo "✅ Pasta de testes encontrada"
            ls -la cypress/e2e/dog-api/
          else
            echo "❌ Pasta de testes não encontrada"
            exit 1
          fi

      - name: Quality Report
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "📊 Relatório de Qualidade"
          echo "═══════════════════════════════════════"
          echo "✅ Sintaxe JavaScript: OK"
          echo "✅ Arquivos JSON: OK"
          echo "✅ Estrutura de testes: OK"
          echo "═══════════════════════════════════════"
